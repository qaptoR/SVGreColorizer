on:
  push:
    branches:
        - '**'

env:
  GODOT_VERSION: 4.6.3
  EXPORT_NAME: SVGreColorizer
  ITCH_USERNAME: aldozeroun
  ITCH_GAME_ID: svgrecolorizer
  PROJECT_PATH: .

jobs:
  export-windows:
    name: Windows Export
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.6.3

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          lfs: false

      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mkdir -v -p ~/.config
          mv /root/.config/godot ~/.config/godot
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable

      - name: Windows Build
        run: |
          mkdir -v -p build/windows
          EXPORT_DIR="$(readlink -f build)"
          cd $PROJECT_PATH
          godot --headless --verbose --export-release "Windows Desktop" "$EXPORT_DIR/windows/$EXPORT_NAME.exe"

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows
          path: build/windows


  export-linux:
    name: Linux Export
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.6.3

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable

      - name: Linux Build
        run: |
          mkdir -v -p build/linux
          EXPORT_DIR="$(readlink -f build)"
          cd $PROJECT_PATH
          godot --headless --verbose --export-release "Linux/X11" "$EXPORT_DIR/linux/$EXPORT_NAME.x86_64"

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux
          path: build/linux
  # Job for deploying the project to Itch.io
  deploy:
    name: Upload Exports to Itch
    runs-on: ubuntu-latest
    needs: 
      - export-windows
      - export-linux
    # Only run this job on main branch
    if: github.ref == 'refs/heads/master'
    strategy:
      fail-fast: true
      matrix:
        channel:
          - windows
          - linux
    steps:
      # Downloads the artifact produced by the previous jobs
      - name: Download Artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: ${{ matrix.channel }}
          path: build/${{ matrix.channel }}

      # Publishes the build to Itch.io using the butler tool
      - name: Publish to Itch.io
        uses: KikimoraGames/itch-publish@v0.0.3
        with:
          butlerApiKey: ${{ secrets.BUTLER_API_KEY }}
          gameData: ./build/${{ matrix.channel }}
          itchUsername: ${{ env.ITCH_USERNAME }}
          itchGameId: ${{ env.ITCH_GAME_ID }}
          buildChannel: ${{ matrix.channel }}
          buildNumber: ${{ github.run_number }}

